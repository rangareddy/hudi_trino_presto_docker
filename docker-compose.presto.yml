# Merged with docker-compose.yml when ENABLE_PRESTO is true (.env.compose from build.sh / run script).

services:
  presto:
    image: $DOCKER_HUB_USERNAME/presto:latest
    container_name: presto
    depends_on:
      - hive-metastore
      - minio
    ports:
      - "8086:8080"   # Presto Web UI / JDBC (prestodb)
      - "9092:9092"   # JMX Prometheus metrics (if enabled in jvm.config)
    networks:
      - hudi-datalake
